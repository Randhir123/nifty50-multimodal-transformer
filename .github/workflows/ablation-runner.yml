name: Multimodal Ablation Runner

on:
  push:
  pull_request:

jobs:
  ablation-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest

      - name: Run ablation runner tests
        run: pytest tests/unit/test_ablation_runner.py

      - name: Build toy all-modality artifact
        run: |
          mkdir -p data/processed
          python scripts/build_multimodal_samples.py \
            --toy-output data/processed/multimodal_samples.npz \
            --num-samples 12 \
            --window-size 5 \
            --tabular-dim 4 \
            --image-dim 16 \
            --text-dim 16

      - name: Run one-epoch ablation study
        run: |
          python scripts/run_ablation_study.py \
            --dataset data/processed/multimodal_samples.npz \
            --output-dir data/processed/ablations \
            --epochs 1 \
            --batch-size 2 \
            --device cpu \
            --model-dim 16 \
            --num-heads 4 \
            --num-layers 1 \
            --ff-dim 32 \
            --val-fraction 0.25

      - name: Verify ablation outputs
        run: |
          test -f data/processed/ablations/ablation_results.csv
          test -f data/processed/ablations/ablation_results.json
          python - <<'PY'
          import csv
          rows = list(csv.DictReader(open('data/processed/ablations/ablation_results.csv', newline='')))
          assert len(rows) == 5, rows
          assert rows[0]['variant'] == 'tabular_only'
          assert rows[-1]['variant'] == 'tabular_image_text_kg'
          PY
