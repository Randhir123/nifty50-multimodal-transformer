name: Text Multimodal Samples

on:
  push:
  pull_request:

jobs:
  text-multimodal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest

      - name: Run text multimodal tests
        run: pytest tests/unit/test_text_multimodal_samples.py

      - name: Build text multimodal artifact
        run: |
          mkdir -p data/processed
          cat > /tmp/tabular_samples.csv <<'CSV'
          stock_id,date,feature_1,feature_2,label
          AAA.NS,2024-01-01,0.0,10.0,1
          AAA.NS,2024-01-02,1.0,11.0,0
          AAA.NS,2024-01-03,2.0,12.0,1
          AAA.NS,2024-01-04,3.0,13.0,0
          BBB.NS,2024-01-01,100.0,110.0,1
          BBB.NS,2024-01-02,101.0,111.0,0
          BBB.NS,2024-01-03,102.0,112.0,1
          BBB.NS,2024-01-04,103.0,113.0,0
          CSV
          cat > /tmp/text_records.csv <<'CSV'
          stock_id,event_date,source_type,title,body_text
          AAA.NS,2024-01-02,news,AAA early update,AAA early information.
          AAA.NS,2024-01-04,filing,AAA later update,AAA later information.
          BBB.NS,2024-01-03,guidance,BBB update,BBB information.
          CSV
          python scripts/build_multimodal_samples.py \
            --tabular-csv /tmp/tabular_samples.csv \
            --feature-cols feature_1,feature_2 \
            --text-records-csv /tmp/text_records.csv \
            --text-dim 16 \
            --output data/processed/tabular_text_multimodal_samples.npz \
            --window-size 3

      - name: Run text fusion smoke test
        run: |
          python -m src.training.train_fusion \
            --dataset data/processed/tabular_text_multimodal_samples.npz \
            --use-text \
            --checkpoint-path data/processed/checkpoints/ci_fusion_transformer_text.pt \
            --epochs 1 \
            --batch-size 2 \
            --device cpu \
            --model-dim 16 \
            --num-heads 4 \
            --num-layers 1 \
            --ff-dim 32
